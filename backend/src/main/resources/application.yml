spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    # sslMode는 DB_SSL_MODE로 주입한다 (DISABLED / PREFERRED / REQUIRED / VERIFY_CA / VERIFY_IDENTITY).
    # 기본값은 로컬 db 컨테이너 기준 DISABLED이며, 운영(RDS)에서는 REQUIRED를 주입한다.
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:showmethemoney}?createDatabaseIfNotExist=true&sslMode=${DB_SSL_MODE:DISABLED}&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080
