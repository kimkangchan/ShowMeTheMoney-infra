name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: showmethemoney
          MYSQL_USER: ci_user
          MYSQL_PASSWORD: ci_password
          MYSQL_ROOT_PASSWORD: ci_root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uci_user -pci_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: showmethemoney
      DB_USERNAME: ci_user
      DB_PASSWORD: ci_password
      JWT_SECRET: ci-only-jwt-secret-key-with-at-least-32-bytes
      JWT_EXPIRATION: 3600
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
          cache-dependency-path: |
            backend/*.gradle
            backend/gradle/wrapper/gradle-wrapper.properties

      - name: Run backend tests
        run: ./gradlew test --no-daemon

  frontend-check:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.invalid

  helm-check:
    name: Helm lint and template
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0
        with:
          version: v4.2.0

      - name: Lint Helm charts
        run: |
          helm lint helm/backend --strict --kube-version 1.36.0
          helm lint helm/frontend --strict --kube-version 1.36.0

      - name: Render Helm charts
        run: |
          mkdir -p "${RUNNER_TEMP}/helm-rendered"

          helm template smtm-backend helm/backend \
            --namespace smtm \
            --kube-version 1.36.0 \
            --set image.repository=example.invalid/smtm-backend \
            --set image.tag=ci \
            --set secret.create=true \
            --set-string secret.data.DB_HOST=mysql \
            --set-string secret.data.DB_USERNAME=ci_user \
            --set-string secret.data.DB_PASSWORD=ci_password \
            --set-string secret.data.JWT_SECRET=ci-only-jwt-secret-key-with-at-least-32-bytes \
            > "${RUNNER_TEMP}/helm-rendered/backend.yaml"

          helm template smtm-frontend helm/frontend \
            --namespace smtm \
            --kube-version 1.36.0 \
            --set image.repository=example.invalid/smtm-frontend \
            --set image.tag=ci \
            --set ingress.enabled=true \
            --set ingress.host=smtm.example.invalid \
            > "${RUNNER_TEMP}/helm-rendered/frontend.yaml"

      - name: Check rendered manifests
        run: |
          test -s "${RUNNER_TEMP}/helm-rendered/backend.yaml"
          test -s "${RUNNER_TEMP}/helm-rendered/frontend.yaml"

          if grep -REn '<[A-Z][A-Z0-9_]*>' "${RUNNER_TEMP}/helm-rendered"; then
            echo "Unresolved placeholder found in rendered Helm manifests."
            exit 1
          fi

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-test
      - frontend-check
      - helm-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --tag smtm-backend:ci ./backend

      - name: Build frontend image
        run: >-
          docker build
          --build-arg NEXT_PUBLIC_API_URL=https://example.invalid
          --tag smtm-frontend:ci
          ./frontend
